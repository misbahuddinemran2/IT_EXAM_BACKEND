# Server
server.port=8080
server.servlet.context-path=/api/v1

# Database - Neon PostgreSQL
spring.datasource.name=neondb
spring.datasource.url=jdbc:postgresql://ep-gentle-resonance-ao9o2af1.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_VMFQ9TbGpY7q
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# Logging
logging.level.com.examplatform=DEBUG
logging.level.org.springframework.web=DEBUG

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Jackson
spring.jackson.time-zone=Asia/Dhaka
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# JWT
app.jwt.secret=exam-platform-secret-key-minimum-256-bits-long-change-in-prod
app.jwt.expiration-ms=86400000

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true

# Pagination
app.pagination.default-page-size=20
app.pagination.max-page-size=100

