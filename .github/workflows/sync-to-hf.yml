name: Sync to Hugging Face Space

on:
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push -f https://Emran2:$HF_TOKEN@huggingface.co/spaces/Emran2/itexam-backend master:main
